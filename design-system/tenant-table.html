<!-- @dsCard group="Components" -->
<!doctype html>
<html><head><meta charset="utf-8"><title>Tenant breakdown table</title>
<style>
:root{--bg:#f6f7f9;--panel:#fff;--border:#e3e6ea;--text:#1d2530;--muted:#6b7686;--accent:#2f6df6;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:24px}
table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:14px}
th{background:#fafbfc;color:var(--muted);font-weight:600}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.ghost{background:transparent;color:var(--accent);border:none;font-weight:600;cursor:pointer;font-size:14px}
</style></head>
<body>
  <table>
    <thead><tr>
      <th>Tenant</th><th class="num">SF</th><th class="num">Base rent</th><th class="num">Share</th>
      <th class="num">Tax $</th><th class="num">Tax $/SF</th><th class="num">CAM $</th><th class="num">CAM $/SF</th><th></th>
    </tr></thead>
    <tbody>
      <tr><td>Bright Coffee Co.</td><td class="num">2,000 SF</td><td class="num">$60,000.00</td><td class="num">40.0%</td>
        <td class="num">$10,000.00</td><td class="num">$5.00</td><td class="num">$7,200.00</td><td class="num">$3.60</td>
        <td><button class="ghost">Invoice</button></td></tr>
      <tr><td>City Dental</td><td class="num">3,000 SF</td><td class="num">$84,000.00</td><td class="num">60.0%</td>
        <td class="num">$15,000.00</td><td class="num">$5.00</td><td class="num">$10,800.00</td><td class="num">$3.60</td>
        <td><button class="ghost">Invoice</button></td></tr>
    </tbody>
  </table>
</body></html>
