<!doctype html>
<html><head><meta charset="utf-8"><title>Escalation recommendation</title>
<style>
:root{--bg:#f6f7f9;--panel:#fff;--border:#e3e6ea;--text:#1d2530;--muted:#6b7686;--accent:#2f6df6;--warn:#c47d12;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:24px}
.callout{border:1px solid var(--border);border-left:4px solid var(--accent);background:var(--panel);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.callout.warn{border-left-color:var(--warn)}
.between{display:flex;justify-content:space-between;align-items:center;gap:12px}
.muted{color:var(--muted);font-size:14px}
button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-weight:600;cursor:pointer;font-size:14px}
</style></head>
<body>
  <div class="callout warn">
    <div class="between">
      <div>
        <strong>Rent escalation due — Bright Coffee Co.</strong>
        <div class="muted">Effective 7/15/2026 (+3%): from $60,000.00 to <strong>$61,800.00</strong> per the lease.</div>
      </div>
      <button>Accept change</button>
    </div>
  </div>
  <div class="callout">
    <strong>Upload a lease to auto-fill</strong>
    <div class="muted">PDF, scan, photo, or handwritten. AI fills the fields with confidence scores and source clauses — you review before saving.</div>
  </div>
</body></html>
