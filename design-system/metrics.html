<!-- @dsCard group="Components" -->
<!doctype html>
<html><head><meta charset="utf-8"><title>Metric cards</title>
<style>
:root{--bg:#f6f7f9;--panel:#fff;--border:#e3e6ea;--text:#1d2530;--muted:#6b7686;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:24px}
.metrics{display:flex;gap:14px;flex-wrap:wrap}
.metric{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 18px;min-width:150px}
.metric .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.metric .value{font-size:22px;font-weight:700;margin-top:4px}
</style></head>
<body>
  <div class="metrics">
    <div class="metric"><div class="label">Revenue</div><div class="value">$144,000.00</div></div>
    <div class="metric"><div class="label">Total SF</div><div class="value">5,000 SF</div></div>
    <div class="metric"><div class="label">Taxes</div><div class="value">$25,000.00</div></div>
    <div class="metric"><div class="label">CAM</div><div class="value">$18,000.00</div></div>
    <div class="metric"><div class="label">Tax PSF</div><div class="value">$5.00/SF</div></div>
    <div class="metric"><div class="label">CAM PSF</div><div class="value">$3.60/SF</div></div>
    <div class="metric"><div class="label">Roof (excl. PSF)</div><div class="value">$4,000.00</div></div>
  </div>
</body></html>
